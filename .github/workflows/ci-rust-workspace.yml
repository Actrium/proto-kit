name: ci-rust-workspace

on:
  push:
    paths:
      - 'proto-fingerprint/**'
      - 'proto-fmt/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/ci-rust-workspace.yml'
      - '.github/workflows/publish-crates.yml'
  pull_request:
    paths:
      - 'proto-fingerprint/**'
      - 'proto-fmt/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/ci-rust-workspace.yml'
      - '.github/workflows/publish-crates.yml'

jobs:
  rust-static-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Cargo check
        run: cargo check --workspace

  rust-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cargo test
        run: cargo test --workspace

  proto-fingerprint-package-checks:
    runs-on: ubuntu-latest
    needs:
      - rust-static-checks
      - rust-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cargo package list
        run: cargo package -p proto-fmt --locked --list

      - name: Cargo publish dry run proto-fmt
        run: cargo publish -p proto-fmt --dry-run --locked --registry crates-io

      - name: Cargo package list proto-fingerprint
        run: cargo package -p proto-fingerprint --locked --list

      - name: Cargo publish dry run proto-fingerprint
        run: cargo publish -p proto-fingerprint --dry-run --locked --registry crates-io
