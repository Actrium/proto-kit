name: publish-crates

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout tag commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify crates.io token
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "CARGO_REGISTRY_TOKEN is required."
            exit 1
          fi

      - name: Verify tag version matches Cargo.toml
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          expected_version="${TAG_NAME#v}"
          proto_fingerprint_version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          cargo_toml = Path("proto-fingerprint/Cargo.toml")
          with cargo_toml.open("rb") as fh:
              data = tomllib.load(fh)
          print(data["package"]["version"])
          PY
          )"
          proto_fmt_version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          cargo_toml = Path("proto-fmt/Cargo.toml")
          with cargo_toml.open("rb") as fh:
              data = tomllib.load(fh)
          print(data["package"]["version"])
          PY
          )"

          if [ "${expected_version}" != "${proto_fingerprint_version}" ]; then
            echo "Tag version ${expected_version} does not match proto-fingerprint version ${proto_fingerprint_version}."
            exit 1
          fi

          if [ "${expected_version}" != "${proto_fmt_version}" ]; then
            echo "Tag version ${expected_version} does not match proto-fmt version ${proto_fmt_version}."
            exit 1
          fi

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --workspace

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --workspace

      - name: Cargo publish dry run
        run: cargo publish -p proto-fmt --dry-run --locked --registry crates-io

      - name: Cargo publish dry run proto-fingerprint
        run: cargo publish -p proto-fingerprint --dry-run --locked --registry crates-io

      - name: Publish proto-fmt
        run: |
          set +e
          output="$(cargo publish -p proto-fmt --locked --registry crates-io 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          printf '%s\n' "$output" | grep -F 'already exists on crates.io index' >/dev/null

      - name: Publish proto-fingerprint
        run: |
          set +e
          output="$(cargo publish -p proto-fingerprint --locked --registry crates-io 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          printf '%s\n' "$output" | grep -F 'already exists on crates.io index' >/dev/null
